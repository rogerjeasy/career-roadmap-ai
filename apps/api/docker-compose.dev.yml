services:
  # ── Core infrastructure (always-on) ─────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: crai-postgres
    labels:
      logging: promtail
    environment:
      POSTGRES_USER: crai
      POSTGRES_PASSWORD: crai_dev_password
      POSTGRES_DB: career_roadmap
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crai -d career_roadmap"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: crai-redis
    labels:
      logging: promtail
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Tracing backend (always-on) ──────────────────────────────────────────────
  # Tempo receives OTLP spans from the FastAPI server and the Celery worker.
  # It is always-on so OTEL_TRACING_ENABLED=true works with plain `make dev`.
  # The full dashboarding stack (Prometheus, Grafana, Loki) is opt-in below.
  # Set in .env:
  #   OTEL_TRACING_ENABLED=true
  #   OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317

  tempo:
    image: grafana/tempo:2.7.0
    container_name: crai-tempo
    labels:
      logging: promtail
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./observability/tempo/tempo.yml:/etc/tempo.yml:ro
      - tempo_data:/var/tempo
    ports:
      - "4317:4317"   # OTLP gRPC — API ships traces here
      - "4318:4318"   # OTLP HTTP
      - "3200:3200"   # Tempo HTTP API (Grafana queries here)
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3200/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Observability dashboards (opt-in) ────────────────────────────────────────
  # Start with:  docker compose -f docker-compose.dev.yml --profile observability up -d

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: crai-prometheus
    profiles: [observability]
    labels:
      logging: promtail
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-remote-write-receiver"
      - "--enable-feature=exemplar-storage"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  loki:
    image: grafana/loki:3.2.0
    container_name: crai-loki
    profiles: [observability]
    labels:
      logging: promtail
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  promtail:
    image: grafana/promtail:3.2.0
    container_name: crai-promtail
    profiles: [observability]
    command: ["-config.file=/etc/promtail/promtail-config.yml"]
    volumes:
      - ./observability/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log:ro
    depends_on:
      loki:
        condition: service_healthy

  # ── API Gateway (always-on) ──────────────────────────────────────────────────
  # Kong runs in DB-less mode alongside Postgres and Redis — it is part of the
  # mandatory dev stack, not an optional profile.  All browser traffic routes
  # through Kong so the dev environment mirrors staging/production exactly.
  #
  # Config is hot-reloaded by restarting the container:
  #   make gateway-reload   (or: docker compose restart kong)
  #
  # Proxy access:   http://localhost:8080  (Next.js next.config.ts → here)
  # HTTPS proxy:    https://localhost:8443
  # Admin API:      http://localhost:8001  (localhost only — for deck / debugging)
  kong:
    image: kong:3.8
    container_name: crai-kong
    labels:
      logging: promtail
    environment:
      # DB-less mode — all config is in the mounted kong.dev.yml
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.dev.yml

      # Listeners
      KONG_PROXY_LISTEN: "0.0.0.0:8080, 0.0.0.0:8443 ssl"
      # Admin API bound to container-internal address; host port mapped to 127.0.0.1
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      # Status API for health-check probes
      KONG_STATUS_LISTEN: "0.0.0.0:8100"

      # Logging — everything to stdout/stderr so promtail can collect it
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_LOG_LEVEL: notice

      # Performance
      KONG_NGINX_WORKER_PROCESSES: auto
      # Required for SSE: prevents Nginx from buffering streaming responses
      KONG_NGINX_PROXY_PROXY_BUFFERING: "off"

      # Plugins
      KONG_PLUGINS: bundled

      # Distributed tracing — OTel plugin reads these
      KONG_TRACING_INSTRUMENTATIONS: all
      KONG_TRACING_SAMPLING_RATE: "1.0"
    volumes:
      - ./kong/kong.dev.yml:/etc/kong/kong.dev.yml:ro
    ports:
      - "8080:8080"           # Proxy HTTP  — frontend uses this
      - "8443:8443"           # Proxy HTTPS
      - "127.0.0.1:8001:8001" # Admin API   — localhost only
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # Needed on Linux so Kong containers can reach locally running FastAPI/MCP servers.
    # Docker Desktop (Windows/Mac) resolves host.docker.internal automatically.
    extra_hosts:
      - "host.docker.internal:host-gateway"

  pushgateway:
    image: prom/pushgateway:v1.10.0
    container_name: crai-pushgateway
    profiles: [observability]
    labels:
      logging: promtail
    ports:
      - "9091:9091"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9091/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: crai-redis-exporter
    profiles: [observability]
    labels:
      logging: promtail
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: crai-postgres-exporter
    profiles: [observability]
    labels:
      logging: promtail
    environment:
      DATA_SOURCE_NAME: "postgresql://crai:crai_dev_password@postgres:5432/career_roadmap?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.3.0
    container_name: crai-grafana
    profiles: [observability]
    labels:
      logging: promtail
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor metricsSummary
      GF_SERVER_HTTP_PORT: "3300"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3300:3300"
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3300/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres_data:
  redis_data:
  tempo_data:
  prometheus_data:
  loki_data:
  grafana_data:
