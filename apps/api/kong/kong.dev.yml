_format_version: "3.0"
_transform: true

# ─────────────────────────────────────────────────────────────────────────────
# Kong API Gateway — Development (DB-less declarative config)
#
# Kong runs in DB-less mode; this file is the single source of truth.
# Edit here and restart Kong: docker compose restart kong
#
# All upstreams use host.docker.internal because FastAPI and MCP servers run
# as local processes (outside Docker). Redis runs in Docker on the default
# compose network, reachable by service name.
#
# Port map (dev):
#   Kong proxy HTTP  → :8080  (frontend connects here)
#   Kong proxy HTTPS → :8443
#   Kong Admin HTTP  → :8001  (localhost only — for deck / curl debugging)
#   FastAPI          → host.docker.internal:8000  (local uvicorn)
#   MCP servers      → host.docker.internal:300x  (local uvicorn each)
# ─────────────────────────────────────────────────────────────────────────────

# ─── Upstreams (load-balancing + health checks) ───────────────────────────────

upstreams:
  - name: fastapi.upstream
    algorithm: round-robin
    healthchecks:
      active:
        healthy:
          interval: 15
          successes: 2
        unhealthy:
          interval: 5
          http_failures: 2
        http_path: /livez
        type: http
    targets:
      - target: host.docker.internal:8000
        weight: 100

  - name: mcp-job-board.upstream
    algorithm: round-robin
    healthchecks:
      active:
        healthy:
          interval: 30
          successes: 2
        unhealthy:
          interval: 10
          http_failures: 3
        http_path: /livez
        type: http
    targets:
      - target: host.docker.internal:3001
        weight: 100

  - name: mcp-course-catalogue.upstream
    algorithm: round-robin
    healthchecks:
      active:
        healthy:
          interval: 30
          successes: 2
        unhealthy:
          interval: 10
          http_failures: 3
        http_path: /livez
        type: http
    targets:
      - target: host.docker.internal:3002
        weight: 100

  - name: mcp-github-trends.upstream
    algorithm: round-robin
    healthchecks:
      active:
        healthy:
          interval: 30
          successes: 2
        unhealthy:
          interval: 10
          http_failures: 3
        http_path: /livez
        type: http
    targets:
      - target: host.docker.internal:3003
