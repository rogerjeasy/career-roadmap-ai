_format_version: "3.0"
_transform: true

# ─────────────────────────────────────────────────────────────────────────────
# Kong API Gateway — Production declarative config (deck-managed)
#
# Applied to a PostgreSQL-backed Kong cluster via:
#   deck sync --state infrastructure/kong/kong.yml \
#             --env-file infrastructure/kong/.env.production
#
# Variables use deck's ${VAR} interpolation syntax.
# Populate .env.production from the values in deck.env.example before running
# deck sync. Never commit .env.production to version control.
#
# Kong Admin API must be accessible (port-forwarded or inside the VPC)
# before running deck commands.
# ─────────────────────────────────────────────────────────────────────────────

# ─── Upstreams ────────────────────────────────────────────────────────────────

upstreams:
  - name: fastapi.upstream
    algorithm: round-robin
    healthchecks:
      active:
        healthy:
          interval: 15
          successes: 2
        unhealthy:
          interval: 5
          http_failures: 2
        http_path: /livez
        type: http
      passive:
        healthy:
          successes: 5
        unhealthy:
          http_failures: 5
          http_statuses: [500, 502, 503, 504]
    targets:
      - target: ${FASTAPI_UPSTREAM_HOST}:${FASTAPI_UPSTREAM_PORT}
        weight: 100

  - name: mcp-job-board.upstream
    algorithm: round-robin
    healthchecks:
      active:
        healthy:
          interval: 30
          successes: 2
        unhealthy:
          interval: 10
          http_failures: 3
        http_path: /livez
        type: http
      passive:
        healthy:
          successes: 3
        unhealthy:
          http_failures: 3
    targets:
      - target: ${MCP_JOB_BOARD_HOST}:3001
        weight: 100

  - name: mcp-course-catalogue.upstream
    algorithm: round-robin
    healthchecks:
      active:
        healthy:
          interval: 30
          successes: 2
        unhealthy:
          interval: 10
          http_failures: 3
        http_path: /livez
        type: http
    targets:
      - target: ${MCP_COURSE_CATALOGUE_HOST}:3002
        weight: 100

  - name: mcp-github-trends.upstream
    algorithm: round-robin
    healthchecks:
      active:
        healthy:
          interval: 30
          successes: 2
        unhealthy:
          interval: 10
          http_failures: 3
        http_path: /livez
        type: http
    targets:
      - target: ${MCP_GITHUB_TRENDS_HOST}:3003
        weight: 100

  - name: mcp-salary-benchmark.upstream
    algorithm: round-robin
    healthchecks:
      active:
        healthy:
          interval: 30
          successes: 2
        unhealthy:
          interval: 10
          http_failures: 3
        http_path: /livez
        type: http
    targets:
      - target: ${MCP_SALARY_BENCHMARK_HOST}:3004
        weight: 100

  - name: mcp-social-signals.upstream
    algorithm: round-robin
    healthchecks:
      active:
        healthy:
          interval: 30
          successes: 2
        unhealthy:
          interval: 10
          http_failures: 3
        http_path: /livez
        type: http
    targets:
      - target: ${MCP_SOCIAL_SIGNALS_HOST}:3005
        weight: 100

  - name: mcp-calendar.upstream
    algorithm: round-robin
    healthchecks:
      active:
        healthy:
          interval: 30
          successes: 2
        unhealthy:
          interval: 10
          http_failures: 3
        http_path: /livez
        type: http
    targets:
      - target: ${MCP_CALENDAR_HOST}:3006
        weight: 100

  - name: mcp-industry-news.upstream
    algorithm: round-robin
    healthchecks:
      active:
        healthy:
