server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Tail stdout/stderr from Docker containers that have the label logging=promtail.
  # All services in docker-compose.dev.yml carry this label.
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["logging=promtail"]
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: project

  # Forward structured JSON logs written by the API to a bind-mounted log dir.
  # The API writes to stdout; use Docker log driver or a sidecar to produce files.
  # This scrape_config acts as a fallback for log files dropped at /var/log/app/.
  - job_name: api-log-files
    static_configs:
      - targets: [localhost]
        labels:
          job: career-roadmap-api
          environment: development
          __path__: /var/log/app/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            event: event
            timestamp: timestamp
            request_id: request_id
            user_id: user_id
      - labels:
          level:
          event:
      - timestamp:
          source: timestamp
          format: RFC3339Nano
          fallback_formats:
            - RFC3339
            - UnixMs
