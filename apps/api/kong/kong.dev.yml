# ─── Global Plugins ────────────────────────────────────────────────────────────
# Applied to ALL traffic. Route-level plugins with the same name override these.

plugins:
  # ── Observability ─────────────────────────────────────────────────────────

  # Prometheus metrics (scraped from Admin API :8001/metrics by Prometheus).
  # status_code_metrics + latency_metrics + upstream_health_metrics give the
  # full picture for the Grafana "Kong API Gateway" dashboard.
  - name: prometheus
    config:
      status_code_metrics: true
      latency_metrics: true
      upstream_health_metrics: true
      bandwidth_metrics: true
      per_consumer: false

  # OpenTelemetry — sends gateway-level spans to Grafana Tempo.
  # Kong generates a root span that wraps each upstream call, giving full
  # end-to-end trace visibility from browser through Kong into FastAPI.
  # Fails silently if Tempo is not running (observability profile not active).
  - name: opentelemetry
    config:
      endpoint: http://tempo:4318/v1/traces
      resource_attributes:
        service.name: kong-gateway
        service.version: "3.8"
        deployment.environment: development
      propagation:
        default_format: w3c
      batch_flush_delay: 2
      connect_timeout: 1000
      send_timeout: 5000
      read_timeout: 5000

  # ── Traffic control ───────────────────────────────────────────────────────

  # Global rate limit — Redis-backed, per source IP.
  # Route-level plugins override this for endpoints that need tighter limits.
  # Namespace "crai_rl" keeps these keys separate from app-level rate limits.
  - name: rate-limiting
    config:
      minute: 60
      hour: 1000
      day: 10000
      policy: redis
      redis:
        host: redis
        port: 6379
        database: 9
      limit_by: ip
      hide_client_headers: false
      error_code: 429
      error_message: "Too many requests. Please retry after a moment."
      sync_rate: 10

  # Prevent large payloads from reaching upstreams.
  # CV uploads are expected at /api/v1/cv/upload — 10 MB is generous for JSON
  # and covers multi-page PDFs sent as base64.
  - name: request-size-limiting
    config:
      allowed_payload_size: 10
      size_unit: megabytes
      require_content_length: false

  # ── Security ──────────────────────────────────────────────────────────────

  # CORS primary handler. FastAPI keeps its own CORSMiddleware as
  # defense-in-depth (handles the case where a request reaches FastAPI
  # directly, bypassing Kong in dev). Kong's CORS plugin is the authoritative
  # source in production.
  - name: cors
    config:
      origins:
        - "http://localhost:3000"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
        - HEAD
      headers:
        - Accept
        - Accept-Encoding
        - Authorization
        - Content-Type
        - X-Request-Id
        - X-Correlation-Id
        - X-MCP-API-Key
        - Sentry-Trace
        - Baggage
      exposed_headers:
        - X-Request-Id
        - X-Kong-Upstream-Latency
        - X-Kong-Proxy-Latency
        - X-Correlation-Id
      credentials: true
      max_age: 3600
      preflight_continue: false

  # Hardened security headers on every response.
  # Removes server fingerprinting headers that Kong adds by default.
  - name: response-transformer
    config:
      add:
        headers:
          - "X-Content-Type-Options:nosniff"
          - "X-Frame-Options:DENY"
          - "X-XSS-Protection:1; mode=block"
          - "Referrer-Policy:strict-origin-when-cross-origin"
          - "Permissions-Policy:geolocation=(), microphone=(), camera=()"
      remove:
        headers:
          - "X-Powered-By"
          - "Via"
