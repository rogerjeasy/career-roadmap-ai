        healthy:
          interval: 30
          successes: 2
        unhealthy:
          interval: 10
          http_failures: 3
        http_path: /livez
        type: http
    targets:
      - target: host.docker.internal:3004
        weight: 100

  - name: mcp-social-signals.upstream
    algorithm: round-robin
    healthchecks:
      active:
        healthy:
          interval: 30
          successes: 2
        unhealthy:
          interval: 10
          http_failures: 3
        http_path: /livez
        type: http
