# ─── Services ─────────────────────────────────────────────────────────────────

services:
  - name: fastapi
    host: fastapi.upstream
    protocol: http
    port: 80
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    retries: 2
    routes:
      - name: api-v1
        paths:
          - /api/v1
        methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD]
        strip_path: false
        preserve_host: false
        regex_priority: 10

      - name: auth
        paths:
          - /auth
        methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
        strip_path: false
        regex_priority: 10

      - name: health
        paths:
          - /livez
          - /readyz
        methods: [GET, HEAD]
        strip_path: false
        regex_priority: 20
        plugins:
          - name: rate-limiting
            config:
              minute: 600
              policy: local
              limit_by: ip
              hide_client_headers: true

      - name: api-root
        paths:
          - /
        methods: [GET]
        strip_path: false
        regex_priority: 0

  - name: fastapi-sse
    host: fastapi.upstream
    protocol: http
    port: 80
    connect_timeout: 60000
    write_timeout: 3600000
    read_timeout: 3600000
    retries: 0
    routes:
      - name: stream-sse
        paths:
          - /stream
        methods: [GET, OPTIONS]
        strip_path: false
        response_buffering: false
        regex_priority: 15
        plugins:
          - name: rate-limiting
            config:
              minute: 10
              hour: 30
              policy: redis
              redis:
                host: ${REDIS_HOST}
                port: ${REDIS_PORT}
                database: 9
                ssl: true
              limit_by: ip

  - name: mcp-job-board
    host: mcp-job-board.upstream
    protocol: http
    port: 80
    connect_timeout: 30000
    write_timeout: 30000
    read_timeout: 30000
    retries: 1
