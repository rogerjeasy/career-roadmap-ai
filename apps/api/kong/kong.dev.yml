# ─── Services ─────────────────────────────────────────────────────────────────

services:
  # ── FastAPI REST / WebSocket ───────────────────────────────────────────────
  - name: fastapi
    host: fastapi.upstream
    protocol: http
    port: 80
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    retries: 2
    routes:
      - name: api-v1
        paths:
          - /api/v1
        methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD]
        strip_path: false
        preserve_host: false
        regex_priority: 10

      - name: auth
        paths:
          - /auth
        methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
        strip_path: false
        regex_priority: 10

      - name: health
        paths:
          - /livez
          - /readyz
        methods: [GET, HEAD]
        strip_path: false
        regex_priority: 20
        # Health endpoints bypass the global rate limiter via a lenient override.
        plugins:
          - name: rate-limiting
            config:
              minute: 600
              policy: local
              limit_by: ip
              hide_client_headers: true

      - name: api-root
        paths:
          - /
        methods: [GET]
        strip_path: false
        regex_priority: 0

  # ── FastAPI SSE (long-lived streaming connections) ─────────────────────────
  # Separate service entry so we can set 1-hour timeouts and disable buffering
  # without affecting regular API calls.
  #
  # Two paths are covered:
  #   /stream          — legacy path (kept for backwards-compat / health tooling)
  #   /api/v1/stream   — canonical path used by the frontend SSE Route Handler
  #
  # Kong path specificity: /api/v1/stream is longer than /api/v1, so this
  # service wins over the generic api-v1 route for stream requests even at the
  # same regex_priority. The higher regex_priority (15 vs 10) is belt-and-
  # braces insurance.
  - name: fastapi-sse
    host: fastapi.upstream
    protocol: http
    port: 80
    connect_timeout: 60000
    write_timeout: 3600000
    read_timeout: 3600000
    retries: 0
    routes:
      - name: stream-sse
        paths:
          - /stream
          - /api/v1/stream
        methods: [GET, OPTIONS]
        strip_path: false
        response_buffering: false
        regex_priority: 15
        plugins:
          # Tighter rate limit: SSE holds a connection open for up to an hour.
          - name: rate-limiting
            config:
              minute: 10
              hour: 30
              policy: redis
              redis:
                host: redis
                port: 6379
                database: 9
              limit_by: ip
              hide_client_headers: false

  # ── MCP: Job Board (port 3001) ─────────────────────────────────────────────
  - name: mcp-job-board
    host: mcp-job-board.upstream
    protocol: http
    port: 80
    connect_timeout: 30000
    write_timeout: 30000
    read_timeout: 30000
    retries: 1
    routes:
      - name: mcp-job-board-route
        paths:
          - /mcp/job-board
        methods: [GET, POST, OPTIONS]
        strip_path: true
        regex_priority: 10
        plugins:
