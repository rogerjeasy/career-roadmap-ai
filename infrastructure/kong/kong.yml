# ─── Global Plugins ────────────────────────────────────────────────────────────

plugins:
  - name: prometheus
    config:
      status_code_metrics: true
      latency_metrics: true
      upstream_health_metrics: true
      bandwidth_metrics: true
      per_consumer: false

  - name: opentelemetry
    config:
      endpoint: http://${OTEL_ENDPOINT}:4318/v1/traces
      resource_attributes:
        service.name: kong-gateway
        service.version: "3.8"
        deployment.environment: ${ENVIRONMENT}
      propagation:
        default_format: w3c
      batch_flush_delay: 2
      connect_timeout: 2000
      send_timeout: 5000
      read_timeout: 5000

  # Production rate limit — higher per-hour/day ceilings for authenticated users.
  # Per-minute global limit is intentionally conservative; individual routes
  # that need more headroom add their own override plugins above.
  - name: rate-limiting
    config:
      minute: 60
      hour: 2000
      day: 20000
      policy: redis
      redis:
        host: ${REDIS_HOST}
        port: ${REDIS_PORT}
        database: 9
        ssl: true
        ssl_verify: false
      limit_by: ip
      hide_client_headers: false
      error_code: 429
      error_message: "Too many requests. Please retry after a moment."
      sync_rate: 10
      namespace: crai_rl

  - name: request-size-limiting
    config:
      allowed_payload_size: 10
      size_unit: megabytes
      require_content_length: false

  - name: cors
    config:
      origins:
        - ${CORS_ORIGIN_FRONTEND}
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
        - HEAD
      headers:
        - Accept
        - Accept-Encoding
        - Authorization
        - Content-Type
        - X-Request-Id
        - X-Correlation-Id
        - X-MCP-API-Key
        - Sentry-Trace
        - Baggage
      exposed_headers:
        - X-Request-Id
        - X-Kong-Upstream-Latency
        - X-Kong-Proxy-Latency
        - X-Correlation-Id
      credentials: true
      max_age: 3600
      preflight_continue: false

  - name: response-transformer
    config:
      add:
        headers:
          - "X-Content-Type-Options:nosniff"
          - "X-Frame-Options:DENY"
          - "X-XSS-Protection:1; mode=block"
          - "Referrer-Policy:strict-origin-when-cross-origin"
          - "Permissions-Policy:geolocation=(), microphone=(), camera=()"
          - "Strict-Transport-Security:max-age=63072000; includeSubDomains; preload"
      remove:
        headers:
          - "X-Powered-By"
          - "Via"
